<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Unknown wizard — portrait placeholder">
  <defs>
    <radialGradient id="bg" cx="50%" cy="32%" r="90%">
      <stop offset="0%" stop-color="#2b2017"/>
      <stop offset="55%" stop-color="#1a140f"/>
      <stop offset="100%" stop-color="#0b0908"/>
    </radialGradient>
    <radialGradient id="halo" cx="50%" cy="46%" r="52%">
      <stop offset="0%" stop-color="#4a5b6b" stop-opacity=".5"/>
      <stop offset="100%" stop-color="#4a5b6b" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ember" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#ffe6ad"/>
      <stop offset="40%" stop-color="#e8a33d"/>
      <stop offset="100%" stop-color="#e8a33d" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="fig" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2a1e14"/>
      <stop offset="50%" stop-color="#140f0b"/>
      <stop offset="100%" stop-color="#0d0906"/>
    </linearGradient>
  </defs>

  <rect width="300" height="400" fill="url(#bg)"/>
  <ellipse cx="150" cy="205" rx="140" ry="150" fill="url(#halo)"/>

  <!-- hooded, pointed-hat wizard bust silhouette -->
  <g fill="url(#fig)">
    <path d="M40 400 C50 302 92 266 150 266 C208 266 250 302 260 400 Z"/>
    <rect x="131" y="232" width="38" height="42"/>
    <ellipse cx="150" cy="192" rx="44" ry="50"/>
    <path d="M92 150 C118 136 182 136 208 150 C198 162 160 168 150 168 C140 168 102 162 92 150 Z"/>
    <path d="M150 152 C150 152 150 52 112 34 C150 66 176 104 178 152 Z"/>
  </g>

  <!-- a lone star on the hat, and the Sacred Flame ember at the breast -->
  <circle cx="133" cy="118" r="2.4" fill="#e8a33d" opacity=".85"/>
  <circle cx="150" cy="330" r="19" fill="url(#ember)"/>
  <path d="M150 319 c8 7 6 16 0 22 c-6 -6 -8 -15 0 -22 Z" fill="#fff4d6"/>
</svg>
