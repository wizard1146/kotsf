<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>KOTSF · Portrait Gallery</title>
<style>
  :root { --bg:#14110f; --panel:#1c1815; --panel2:#241f1b; --line:#3a322b; --ink:#e7dccb; --dim:#a99e8d; --flame:#e8a33d; --mono:ui-monospace,SFMono-Regular,Menlo,monospace; --sans:system-ui,-apple-system,Segoe UI,Roboto,sans-serif; }
  * { box-sizing: border-box; }
  body { margin:0; background:var(--bg); color:var(--ink); font-family:var(--sans); padding:1.5rem clamp(1rem,4vw,3rem) 4rem; }
  h1 { color:var(--flame); font-size:1.5rem; margin:0 0 .2rem; }
  .sub { color:var(--dim); margin:0 0 1.2rem; font-size:.9rem; }
  .school-hex { display:inline-block; width:.7em; height:.7em; border-radius:2px; vertical-align:middle; margin-right:.35em; }

  .controls { display:flex; flex-wrap:wrap; gap:1.2rem; align-items:center; margin:0 0 1.4rem; padding:.7rem .9rem; background:var(--panel); border:1px solid var(--line); border-radius:10px; }
  .controls label { font-size:.85rem; color:var(--dim); display:inline-flex; align-items:center; gap:.4rem; cursor:pointer; }
  .controls .seg { display:inline-flex; border:1px solid var(--line); border-radius:6px; overflow:hidden; }
  .controls .seg button { background:var(--panel2); color:var(--dim); border:0; padding:.35rem .7rem; font:inherit; font-size:.82rem; cursor:pointer; }
  .controls .seg button.on { background:#2a2018; color:var(--flame); }

  /* coverage matrix */
  .coverage { margin:0 0 1.8rem; overflow-x:auto; }
  table { border-collapse:collapse; font-size:.8rem; }
  th, td { border:1px solid var(--line); padding:.3rem .55rem; text-align:center; }
  th { color:var(--dim); font-weight:600; }
  td.cell { font-family:var(--mono); cursor:pointer; user-select:none; }
  td.cell:hover { background:#241d16; color:var(--flame); }
  td.cell.sel { background:#3a2a15; color:var(--flame); outline:2px solid var(--flame); outline-offset:-2px; }
  td.have { color:var(--flame); }
  td.none { color:#5c5348; }
  .rowlabel { text-align:left; color:var(--ink); text-transform:capitalize; }
  .coverage .hint { color:var(--dim); font-size:.75rem; margin:.4rem 0 0; }
  tr.hidden-row td { border-top:2px dashed #4a3f36; }
  .hidden-badge { font-size:.58rem; text-transform:uppercase; letter-spacing:.06em; color:var(--dim); border:1px solid var(--line); border-radius:3px; padding:.02em .3em; margin-left:.4em; vertical-align:middle; }

  /* prompt generator */
  .gen { margin:0 0 1.8rem; background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:1rem 1.1rem 1.2rem; }
  .gen-head { display:flex; flex-wrap:wrap; align-items:center; gap:.6rem 1rem; margin:0 0 .9rem; }
  .gen-title { color:var(--flame); font-size:1rem; margin:0; }
  .gen-sel { font-family:var(--mono); font-size:.82rem; color:var(--ink); display:inline-flex; align-items:center; gap:.35rem; }
  .gen-sel .muted { color:var(--dim); }
  .gen-ctrl { display:flex; flex-wrap:wrap; align-items:center; gap:.5rem 1.1rem; margin:0 0 .9rem; padding:.6rem .7rem; background:var(--panel2); border:1px solid var(--line); border-radius:8px; }
  .gen-ctrl label { font-size:.8rem; color:var(--dim); display:inline-flex; align-items:center; gap:.4rem; }
  .gen-ctrl select, .gen-ctrl input[type=text] { background:var(--bg); color:var(--ink); border:1px solid var(--line); border-radius:5px; padding:.28rem .45rem; font:inherit; font-size:.8rem; }
  .gen-ctrl input[type=text] { min-width:min(320px,60vw); font-family:var(--mono); }
  .gen-note { color:var(--dim); font-size:.76rem; margin:0 0 .9rem; line-height:1.45; }
  .gen-note b { color:var(--flame); font-weight:600; }
  .variant { margin:0 0 .8rem; }
  .variant:last-child { margin-bottom:0; }
  .variant-h { display:flex; align-items:center; gap:.5rem; margin:0 0 .35rem; font-size:.82rem; }
  .variant-h .age { color:var(--flame); font-weight:600; text-transform:capitalize; }
  .variant-h .vcode { font-family:var(--mono); color:var(--dim); }
  .variant-h .anchor { font-size:.68rem; color:var(--bg); background:var(--flame); border-radius:3px; padding:.05rem .35rem; font-weight:600; }
  .variant-h .copy { margin-left:auto; background:var(--panel2); color:var(--dim); border:1px solid var(--line); border-radius:5px; padding:.22rem .6rem; font:inherit; font-size:.75rem; cursor:pointer; }
  .variant-h .copy:hover { color:var(--flame); border-color:var(--flame); }
  .variant-h .copy.done { color:var(--flame); border-color:var(--flame); }
  .variant textarea { width:100%; box-sizing:border-box; background:var(--bg); color:var(--ink); border:1px solid var(--line); border-radius:6px; padding:.5rem .6rem; font-family:var(--mono); font-size:.72rem; line-height:1.5; resize:vertical; min-height:5.2em; }

  .group-h { color:var(--flame); font-size:1.05rem; margin:1.6rem 0 .7rem; text-transform:capitalize; border-bottom:1px solid var(--line); padding-bottom:.3rem; }
  .warn { color:#e0803e; font-size:.8rem; margin-left:.5rem; font-weight:400; text-transform:none; }
  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:1rem; }
  .card { background:var(--panel); border:1px solid var(--line); border-radius:10px; overflow:hidden; }
  .frame { position:relative; aspect-ratio:3/4; background:repeating-conic-gradient(#211c18 0% 25%, #191510 0% 50%) 50%/22px 22px; display:grid; place-items:center; }
  .frame img { width:100%; height:100%; display:block; }
  body[data-fit="cover"] .frame img { object-fit:cover; }
  body[data-fit="contain"] .frame img { object-fit:contain; }
  .meta { padding:.5rem .6rem .6rem; }
  .fname { font-family:var(--mono); font-size:.72rem; color:var(--ink); word-break:break-all; margin-bottom:.3rem; }
  .tags { display:flex; flex-wrap:wrap; gap:.3rem; font-size:.68rem; }
  .tag { background:var(--panel2); border:1px solid var(--line); border-radius:4px; padding:.1rem .4rem; color:var(--dim); }
  .tag.age { color:var(--flame); }
  .tag.bad { color:#e0803e; border-color:#5a3a22; }
  .dim-note { font-family:var(--mono); font-size:.68rem; color:var(--dim); margin-top:.35rem; }
  .dim-note.small { color:#e0803e; }
  .err { color:#e0803e; background:var(--panel); border:1px solid #5a3a22; border-radius:8px; padding:1rem; }
</style>
</head>
<body data-fit="cover">
  <h1>Portrait Gallery</h1>
  <p class="sub">Every file in <code>assets/portraits/</code> (from the build manifest). Naming: <code>portrait_&lt;school&gt;_&lt;gender&gt;_&lt;NNN&gt;&lt;a|b|c&gt;.webp</code> — a/b/c = young/middle/old. Serve via the dev server (this page fetches the bundle).</p>

  <div class="controls">
    <span style="color:var(--dim);font-size:.85rem">Fit</span>
    <div class="seg" id="fit">
      <button data-fit="cover" class="on">Cropped (in-game 3:4)</button>
      <button data-fit="contain">Full image</button>
    </div>
    <span id="count" style="color:var(--dim);font-size:.85rem;margin-left:auto"></span>
  </div>

  <div class="gen" id="gen"></div>

  <div id="out"><p class="sub">Loading…</p></div>

<script>
const SCHOOLS = ['red','yellow','brown','green','blue','purple','white','black'];
const HIDDEN = new Set(['black']); // hidden 8th cult — a real portrait slot, but not one of the seven public schools
const HEX = { red:'#c0392b', yellow:'#d4ac0d', brown:'#8a5a1f', green:'#229954', blue:'#2471a3', purple:'#7d3c98', white:'#d5d8dc', black:'#2b2723' };
const AGE = { a:'young', b:'middle', c:'old' };
const PLACEHOLDER = '../assets/portraits/portrait_placeholder.svg';

/* ---- Midjourney prompt generator (per design/PORTRAIT_PROMPTS.md §3) ----
   A matrix cell fixes school + gender; the class picker sets the idiom;
   the a/b/c tier lever sets seniority (age + dress + regalia + bearing). */

// robe colour word (b/c robes) — hats use the plain school word (blue, red, …)
const SCHOOL_ROBE = { red:'crimson', yellow:'gold', brown:'earth-brown', green:'moss-green', blue:'indigo-blue', purple:'violet', white:'bone-white', black:'charcoal-black' };
// per-school accent light (the cult drives hat, robe trim, and magic light)
const SCHOOL_LIGHT = {
  red:    'warm crimson firelight raking one side of the face',
  yellow: 'warm gold light on one side',
  brown:  'warm ochre firelight on one side',
  green:  'cool green dappled light on one side',
  blue:   'cool blue arcane light from one side',
  purple: 'intense violet-magenta magic light on one side',
  white:  'cold pale light with a thread of violet at the edges',
  black:  'deep shadow with a thin cold rim of violet-black glow on one side',
};
// the {TIER} lever — rise shows across face, wardrobe, regalia, and posture
const TIER = {
  a: { article:'a young',        face:'a smooth unlined face and eager unproven eyes',
       robePrefix:'plain undyed roughspun', robeSuffix:'with no insignia, a simple cord belt and a single small charm',
       hat:'a plain pointed',    staff:'holding no staff' },
  b: { article:'a middle-aged',  face:'a lined competent face and steady assured eyes',
       robePrefix:'well-made {COLOR}',      robeSuffix:'with embroidered trim and a modest rank-brooch, several earned rune-charms',
       hat:'a pointed',          staff:'carrying a carved working-staff with a rune-etched head' },
  c: { article:'an old',         face:'a deeply lined weathered face, grey hair and sunken knowing eyes',
       robePrefix:'rich layered {COLOR}',   robeSuffix:'of office heavy with gold-and-rune embroidery, a rank medallion and fine fur trim, many rune-charms',
       hat:'a tall pointed',     staff:'bearing an ornate staff of office, a commanding presence' },
};
// one entry per class in view.js CLASS_LABEL / PORTRAIT_PROMPTS.md §3
const CLASSES = {
  magus:       { label:'Magus',        adj:'composed learned magus',       feat:'a measured gaze',                                    robe:'scholar-mage robes',              flavor:'a keeper of balanced disciplines' },
  sorcerer:    { label:'Sorcerer',     adj:'intense sorcerer',             feat:'taut features and faint glowing veins of magic at the temples', robe:'mage-robes',            flavor:'channeling raw innate power, dangerous and self-taught' },
  druid:       { label:'Druid',        adj:'wild druid',                   feat:'leaf-tangled hair and a weather-bright gaze',        robe:'hide-and-moss robes',             flavor:'a keeper of the broken land' },
  necromancer: { label:'Necromancer',  adj:'gaunt hollow-eyed necromancer',feat:'ash-pale skin and a cold patient stare',             robe:'bone-charm robes',                flavor:'a small skull familiar at the shoulder, grim and unhurried' },
  pyromancer:  { label:'Pyromancer',   adj:'fervent pyromancer',           feat:'singed brows and eyes lit with reflected fire',      robe:'scorch-marked robes',             flavor:'small flames dancing at the fingertips, zealous and volatile' },
  enchanter:   { label:'Enchanter',    adj:'meticulous enchanter',         feat:"fine features and a jeweler's focus",                robe:'rune-stitched robes',             flavor:'rings of worked silver on every finger, patient and precise' },
  charmer:     { label:'Charmer',      adj:'beguiling charmer',            feat:'a warm knowing smile and bright disarming eyes',     robe:'well-kept robes',                 flavor:'a single charmed songbird familiar, persuasive and quick' },
  chaosmage:   { label:'Chaos Mage',   adj:'erratic chaos mage',           feat:'asymmetric wild hair and a manic uneven grin',       robe:'patchwork robes',                 flavor:'sparks and glitching magic around the hands, unpredictable and grinning' },
  ghosteater:  { label:'Ghost Eater',  adj:'haunted ghost-eater',          feat:'sunken cheeks and a faintly glowing throat',         robe:'wind-worn spirit-robes',          flavor:'a captured ghost-light in a jar at the collar, hollow and hungry and quiet' },
};

function buildPrompt(school, gender, age, classKey, opts = {}) {
  const t = TIER[age], c = CLASSES[classKey];
  const g = gender === 'female' ? 'woman' : 'man';
  const color = SCHOOL_ROBE[school] || school;
  const robes = `${t.robePrefix.replace('{COLOR}', color)} ${c.robe} ${t.robeSuffix}`;
  const hat = `${t.hat} ${school} wizard hat`;
  const light = SCHOOL_LIGHT[school] || 'firelit from one side';
  const subject = `${t.article} ${g} ${c.adj} with ${t.face}, ${c.feat}, ${robes}, ${hat}, ${t.staff}, ${c.flavor}`;
  const style = `slight three-quarter turn with eyes to camera, painterly semi-realistic illustration in the style of King of Dragon's Pass character portraits, matte finish with visible brushwork, muted earthy palette, no linework, occult-folk post-cataclysm Forgotten Runes wizard, ${light} against a softly-lit environmental backdrop, a warm firelit hall or hold suggested in muted mid-tones, clearly visible but out of focus behind the figure, gentle atmospheric depth, soft rim light, dark fantasy, characterful face, centered bust crop, no text, no lettering`;
  let p = `head-and-shoulders character portrait of ${subject}, ${style} --ar 4:5 --style raw --v 6`;
  if (opts.sref && age !== 'b') p += ` --sref ${opts.sref}`;   // b is the anchor; sref the young & old to it
  if (opts.seed) p += ` --seed ${opts.seed}`;
  return p;
}

// --- generator panel state + render ---
const sel = { school: SCHOOLS[0], gender: 'female', classKey: 'magus' };
const genOpts = { seed: '777', sref: '' };

function renderGen() {
  const gen = document.getElementById('gen');
  const s = sel.school, hex = HEX[s] || '#777';
  const classOpts = Object.entries(CLASSES).map(([k, v]) => `<option value="${k}"${k === sel.classKey ? ' selected' : ''}>${v.label}</option>`).join('');
  const order = ['b', 'a', 'c']; // anchor (middle) first, per the matched-set workflow
  const variants = order.map(a => {
    const prompt = buildPrompt(s, sel.gender, a, sel.classKey, { seed: genOpts.seed.trim(), sref: genOpts.sref.trim() });
    const fname = `portrait_${s}_${sel.gender}_NNN${a}.webp`;
    return `<div class="variant">
      <div class="variant-h">
        <span class="age">${AGE[a]}</span><span class="vcode">${a} · ${fname}</span>
        ${a === 'b' ? '<span class="anchor">anchor — generate first</span>' : ''}
        <button class="copy" data-copy>Copy</button>
      </div>
      <textarea readonly rows="4">${prompt.replace(/</g, '&lt;')}</textarea>
    </div>`;
  }).join('');

  gen.innerHTML = `
    <div class="gen-head">
      <h2 class="gen-title">Prompt generator</h2>
      <span class="gen-sel"><span class="school-hex" style="background:${hex}"></span><span>${s}</span><span class="muted">·</span><span>${sel.gender}</span><span class="muted">·</span><span>${CLASSES[sel.classKey].label}</span></span>
    </div>
    <div class="gen-ctrl">
      <label>Class <select id="gen-class">${classOpts}</select></label>
      <label>Gender
        <select id="gen-gender">
          <option value="female"${sel.gender === 'female' ? ' selected' : ''}>female</option>
          <option value="male"${sel.gender === 'male' ? ' selected' : ''}>male</option>
        </select></label>
      <label>Seed <input type="text" id="gen-seed" value="${genOpts.seed}" style="min-width:5em;width:5em" placeholder="none"></label>
      <label>--sref URL <input type="text" id="gen-sref" value="${genOpts.sref.replace(/"/g, '&quot;')}" placeholder="paste the middle (b) image URL, applied to young &amp; old"></label>
    </div>
    <p class="gen-note"><b>Click any matrix cell below</b> to point the generator at that school &amp; gender slot. Then generate the <b>middle (b)</b> portrait first, upscale the best, paste its image URL into <b>--sref</b> above so the young &amp; old variants render as the same person risen through the ranks. Keep the <b>seed</b> fixed across the set.</p>
    ${variants}`;

  gen.querySelector('#gen-class').addEventListener('change', e => { sel.classKey = e.target.value; renderGen(); });
  gen.querySelector('#gen-gender').addEventListener('change', e => { sel.gender = e.target.value; syncCells(); renderGen(); });
  gen.querySelector('#gen-seed').addEventListener('input', e => { genOpts.seed = e.target.value; renderGen(); });
  gen.querySelector('#gen-sref').addEventListener('input', e => { genOpts.sref = e.target.value; renderGen(); });
  gen.querySelectorAll('[data-copy]').forEach(btn => btn.addEventListener('click', e => {
    const ta = e.target.closest('.variant').querySelector('textarea');
    navigator.clipboard.writeText(ta.value).then(() => {
      e.target.textContent = 'Copied ✓'; e.target.classList.add('done');
      setTimeout(() => { e.target.textContent = 'Copy'; e.target.classList.remove('done'); }, 1400);
    }, () => { ta.select(); document.execCommand('copy'); });
  }));
}

function syncCells() {
  document.querySelectorAll('td.cell').forEach(td => {
    td.classList.toggle('sel', td.dataset.school === sel.school && td.dataset.gender === sel.gender);
  });
}

function parseName(f) {
  const base = f.replace(/^portraits?_/, '').replace(/\.[a-z0-9]+$/i, '');
  const [school, gender, idv = ''] = base.split('_');
  const v = (idv.match(/[a-z]$/i) || [''])[0].toLowerCase();
  return { f, school, gender, num: idv.replace(/[a-z]$/i, ''), variant: v, age: AGE[v] || '?' };
}

function card(p) {
  const badSchool = !SCHOOLS.includes(p.school);
  const el = document.createElement('div');
  el.className = 'card';
  el.innerHTML = `
    <div class="frame"><img src="../assets/portraits/${p.f}" alt="${p.f}" loading="lazy"></div>
    <div class="meta">
      <div class="fname">${p.f}</div>
      <div class="tags">
        <span class="tag ${badSchool ? 'bad' : ''}">${badSchool ? '⚠ ' : ''}<span class="school-hex" style="background:${HEX[p.school] || '#777'}"></span>${p.school}</span>
        <span class="tag">${p.gender}</span>
        <span class="tag age">${p.age}${p.variant ? ' ('+p.variant+')' : ''}</span>
        ${p.num ? `<span class="tag">#${p.num}</span>` : ''}
      </div>
      <div class="dim-note" data-dim>measuring…</div>
    </div>`;
  const img = el.querySelector('img');
  const dim = el.querySelector('[data-dim]');
  img.addEventListener('load', () => {
    const w = img.naturalWidth, h = img.naturalHeight;
    dim.textContent = `${w}×${h}px · ${(w/h).toFixed(2)}:1`;
    if (Math.min(w, h) < 360) dim.classList.add('small'), dim.textContent += '  ⚠ small';
  });
  img.addEventListener('error', () => { dim.textContent = '⚠ failed to load'; dim.classList.add('small'); });
  return el;
}

function coverage(items) {
  const wrap = document.createElement('div');
  wrap.className = 'coverage';
  const genders = ['female','male'], ages = ['a','b','c'];
  let head = '<tr><th>school</th>';
  for (const g of genders) for (const a of ages) head += `<th>${g[0]}·${AGE[a]}</th>`;
  head += '</tr>';
  let rows = '';
  for (const s of SCHOOLS) {
    const hidLabel = HIDDEN.has(s) ? '<span class="hidden-badge">hidden</span>' : '';
    let r = `<tr class="${HIDDEN.has(s) ? 'hidden-row' : ''}"><td class="rowlabel"><span class="school-hex" style="background:${HEX[s]}"></span>${s}${hidLabel}</td>`;
    for (const g of genders) for (const a of ages) {
      const n = items.filter(p => p.school === s && p.gender === g && p.variant === a).length;
      r += `<td class="cell ${n ? 'have' : 'none'}" data-school="${s}" data-gender="${g}" data-age="${a}">${n || '·'}</td>`;
    }
    rows += r + '</tr>';
  }
  wrap.innerHTML = `<table>${head}${rows}</table><p class="hint">Click a cell to load its Midjourney prompt in the generator above. Numbers = portraits already in the bundle for that slot.</p>`;
  wrap.addEventListener('click', e => {
    const td = e.target.closest('td.cell'); if (!td) return;
    sel.school = td.dataset.school; sel.gender = td.dataset.gender;
    syncCells(); renderGen();
    document.getElementById('gen').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  });
  return wrap;
}

renderGen(); // generator works without the bundle; cells wire up once coverage renders

(async () => {
  const out = document.getElementById('out');
  let bundle;
  try { bundle = await (await fetch('../content/bundle.json', { cache: 'no-store' })).json(); }
  catch (e) { out.innerHTML = `<div class="err">Couldn't load <code>../content/bundle.json</code>. Open this page through the dev server (<code>http://localhost:8000/design/portraits.html</code>), not via file://.</div>`; return; }
  const files = (bundle.portraits || []).slice().sort();
  const items = files.map(parseName);
  document.getElementById('count').textContent = `${items.length} portraits`;

  out.innerHTML = '';
  out.appendChild(coverage(items));
  syncCells(); // highlight the generator's current school+gender slot

  // placeholder preview
  const ph = document.createElement('div');
  ph.innerHTML = `<div class="group-h">Placeholder <span class="warn">shown for any member with no matching portrait</span></div>`;
  const phGrid = document.createElement('div'); phGrid.className = 'grid';
  const phCard = document.createElement('div'); phCard.className = 'card';
  phCard.innerHTML = `<div class="frame" style="background:radial-gradient(120% 90% at 50% 28%, #2a2018, #0c0a08)"><img src="${PLACEHOLDER}" alt="placeholder"></div><div class="meta"><div class="fname">portrait_placeholder.svg</div></div>`;
  phGrid.appendChild(phCard); ph.appendChild(phGrid); out.appendChild(ph);

  // group by school (unknown schools last)
  const bySchool = {};
  for (const p of items) (bySchool[p.school] ||= []).push(p);
  const order = [...SCHOOLS.filter(s => bySchool[s]), ...Object.keys(bySchool).filter(s => !SCHOOLS.includes(s))];
  for (const s of order) {
    const h = document.createElement('div');
    const bad = !SCHOOLS.includes(s);
    const hid = HIDDEN.has(s);
    h.className = 'group-h';
    h.innerHTML = `<span class="school-hex" style="background:${HEX[s] || '#777'}"></span>${s}`
      + (hid ? ` <span class="warn">— hidden 8th cult; a real portrait slot, kept out of the seven-school player UI</span>` : '')
      + (bad ? ` <span class="warn">— not one of the schools; these never match a member</span>` : '');
    out.appendChild(h);
    const grid = document.createElement('div'); grid.className = 'grid';
    for (const p of bySchool[s].sort((a,b) => (a.gender+a.num+a.variant).localeCompare(b.gender+b.num+b.variant))) grid.appendChild(card(p));
    out.appendChild(grid);
  }
})();

document.getElementById('fit').addEventListener('click', (e) => {
  const b = e.target.closest('button'); if (!b) return;
  document.body.dataset.fit = b.dataset.fit;
  for (const x of e.currentTarget.children) x.classList.toggle('on', x === b);
});
</script>
</body>
</html>
